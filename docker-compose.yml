version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archivexm-backend
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "${BACKEND_PORT:-8742}:8000"
    volumes:
      - /mnt/user/appdata/archivexm/data:/app/data
      - /mnt/user/appdata/archivexm/downloads:/app/downloads
      - /mnt/user/appdata/archivexm/downloads:/downloads
      - /mnt/user/appdata/archivexm/output:/app/output
    environment:
      - DATABASE_URL=sqlite:///./data/archivexm.db
      - DOWNLOAD_PATH=/downloads
      - PLAYLIST_SCHEME=${PLAYLIST_SCHEME:-http}
      - PLAYLIST_HOST=${PLAYLIST_HOST:-10.0.0.44}
      - PLAYLIST_PORT=${PLAYLIST_PORT:-8742}
      - PLAYLIST_OUTPUT=${PLAYLIST_OUTPUT:-/app/output/siriusxm.m3u}
    restart: unless-stopped
    networks:
      - archivexm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: archivexm-frontend
    ports:
      - "${FRONTEND_PORT:-8743}:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8742}
    restart: unless-stopped
    networks:
      - archivexm-network

networks:
  archivexm-network:
    driver: bridge

volumes:
  data:
  downloads:
